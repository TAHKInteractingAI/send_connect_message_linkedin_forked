name: LinkedIn Automation
on:
  repository_dispatch:
    types: [run-linkedin-connect, run-linkedin-message] # Hỗ trợ 2 loại sự kiện
  workflow_dispatch:

jobs:
  automation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Khôi phục cookie từ lần chạy trước
      - name: Restore LinkedIn Cookie
        uses: actions/cache@v3
        with:
          path: linkedin_cookies.pkl
          # Key này sẽ luôn thay đổi theo mỗi lần chạy (Run ID)
          key: ${{ runner.os }}-linkedin-session-${{ github.run_id }}
          # Nếu không tìm thấy key trên (chắc chắn là không vì run_id mới), 
          # GitHub sẽ tìm cache có tiền tố này và lấy cái mới nhất (latest)
          restore-keys: |
            ${{ runner.os }}-linkedin-session-

      - name: Run Connect Script
        if: github.event.action == 'run-linkedin-connect'
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          RANGE_NAME: ${{ secrets.RANGE_NAME }}
          GOOGLE_APPLICATION_CRED: ${{ secrets.GOOGLE_APPLICATION_CRED }}
          LINKEDIN_USERNAME: ${{ secrets.LINKEDIN_USERNAME }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
          RAW_COOKIE_BASE64: ${{ secrets.RAW_COOKIE_BASE64 }}
          LINKEDIN_COOKIE: ${{ secrets.LINKEDIN_COOKIE }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          MISSIVE_API_KEY: ${{ secrets.MISSIVE_API_KEY }}
        run: python -c "from copy_of_connect_linkedin_with_cookie import main_connect; main_connect()"

      - name: Run Message Script
        if: github.event.action == 'run-linkedin-message'
        env:
          SPREADSHEET_MESS_ID: ${{ secrets.SPREADSHEET_MESS_ID }}
          GOOGLE_APPLICATION_CRED: ${{ secrets.GOOGLE_APPLICATION_CRED }}
          LINKEDIN_USERNAME: ${{ secrets.LINKEDIN_USERNAME }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          RAW_COOKIE_BASE64: ${{ secrets.RAW_COOKIE_BASE64 }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
          LINKEDIN_COOKIE: ${{ secrets.LINKEDIN_COOKIE }}
          MISSIVE_API_KEY: ${{ secrets.MISSIVE_API_KEY }}
        run: python -c "from copy_of_message_linkedin_with_cookie import main_mess; main_mess()"

      # Lưu lại cookie mới nhất sau khi script chạy xong
      - name: Save LinkedIn Cookie
        if: always()
        uses: actions/cache@v3
        with:
          path: linkedin_cookies.pkl
          # Lưu với key chứa run_id của lần chạy hiện tại
          key: ${{ runner.os }}-linkedin-session-${{ github.run_id }}

      - name: Upload Screenshot
        if: always() # Luôn thực hiện kể cả khi script bị lỗi
        uses: actions/upload-artifact@v4
        with:
          name: linkedin-screenshots
          path: ./*.png  # Lấy tất cả các file có đuôi .png trong thư mục gốc
          retention-days: 2
